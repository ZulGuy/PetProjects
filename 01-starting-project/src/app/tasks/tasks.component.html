<section id="tasks">
  <header>
    <h2>{{name}}' Tasks</h2>
    <menu>
      <button (click)="isOpen = true">Add Task</button>
      @if(isOpen) {
        <app-add-task [userId]="userId" [task]="newTask" (close)="isOpen = false"/>
      }
    </menu>
  </header>

  <ul>
    @for(task of selectedUserTasks; track task.id) {
      <li>
        <app-task [task] = "task"/>
      </li>
    }
  </ul>
</section>
