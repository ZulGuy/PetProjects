<section id="tasks">
  <header>
    <h2>{{name}}' Tasks</h2>
    <menu>
      <button (click)="isOpen = true">Add Task</button>
      <app-add-task [userId]="userId" [task]="newTask" *ngIf="isOpen" (close)="isOpen = false" (taskAdded)="onAddTask($event)"/>
    </menu>
  </header>

  <ul>
    @for(task of selectedUserTasks; track task.id) {
      <li>
        <app-task [task] = "task" (complete)="onCompleteTask($event)"/>
      </li>
    }
  </ul>
</section>
