services:
  auth-api:
    build:
      context:
        ./auth-api
    container_name: auth-api
    ports:
      - "8080:8080"
    env_file:
      - ./environment.env
    depends_on:
      db:
        condition: service_healthy
  data-api:
    build:
      context:
        ./data-api
    container_name: data-api
    ports:
      - "8081:8081"
    env_file:
      - ./environment.env
  db:
    image: postgres:16-alpine
    container_name: db
    env_file:
      - ./environment.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wwt-test-task"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
